<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>JUGAR Board</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #d6b458;
      color: #1f1a14;
    }

    .app {
      width: 100%;
      min-height: 100vh;
      padding: 24px;
      background-image: url("./board-bg.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      position: relative;
      overflow: hidden;
    }

    .app::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.06);
      pointer-events: none;
      z-index: 0;
    }

    .top {
      position: relative;
      z-index: 10;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .top-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .post-button,
    .admin-button {
      border: 1px solid rgba(0,0,0,0.45);
      background: rgba(250, 244, 220, 0.86);
      color: #1f1a14;
      padding: 10px 15px;
      border-radius: 0;
      cursor: pointer;
      font-size: 12px;
      letter-spacing: 0.08em;
      font-weight: 700;
      box-shadow: 0 5px 14px rgba(0,0,0,0.25);
      backdrop-filter: blur(2px);
    }

    .post-button:hover,
    .admin-button:hover {
      background: rgba(255,255,255,0.95);
    }

    .admin-status {
      display: none;
      position: relative;
      z-index: 10;
      margin: 0 0 12px auto;
      width: fit-content;
      max-width: 100%;
      padding: 8px 12px;
      background: rgba(250,244,220,0.92);
      border: 1px solid rgba(0,0,0,0.35);
      font-size: 12px;
      box-shadow: 0 5px 14px rgba(0,0,0,0.22);
    }

    .board {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 820px;
      overflow: hidden;
    }

    .loading,
    .empty,
    .hint {
      position: relative;
      z-index: 2;
      display: inline-block;
      margin: 8px;
      padding: 6px 9px;
      background: rgba(250,244,220,0.85);
      border: 1px solid rgba(0,0,0,0.18);
      font-size: 12px;
      color: rgba(0,0,0,0.7);
    }

    .hint {
      position: absolute;
      left: 8px;
      bottom: 8px;
      margin: 0;
    }

    .note {
      width: 210px;
      min-height: 170px;
      padding: 25px 17px 17px;
      background: #f7f1dd;
      background-size: 100% 100%;
      background-repeat: no-repeat;
      box-shadow:
        0 12px 22px rgba(0,0,0,0.33),
        inset 0 0 18px rgba(0,0,0,0.04);
      transform: rotate(var(--rotate));
      cursor: grab;
      position: absolute;
      word-break: break-word;
      transition: box-shadow 0.18s ease, transform 0.18s ease;
      user-select: none;
      touch-action: none;
      z-index: 3;
      border: 1px solid rgba(0,0,0,0.12);
    }

  .note.paper-a {
  background-image: url("./paper-01.png");
  background-size: 100%;
  background-repeat: no-repeat;
  background-position: center;
  background-color: transparent;
  border: none;
  box-shadow: none;
  width: 260px;
  height: 400px;
  min-height: unset;
}

    .note.paper-b {
      background: #e9dcc0;
      width: 190px;
      min-height: 160px;
    }

    .note.paper-c {
      background: #f2f2ed;
      width: 230px;
      min-height: 150px;
    }

    .note.paper-d {
      background: #f5eee6;
      width: 175px;
      min-height: 220px;
    }

    .note.paper-e {
      background: #eaf0e8;
      width: 220px;
      min-height: 185px;
    }

    .note:hover {
      transform: rotate(var(--rotate)) translateY(-4px) scale(1.03);
      box-shadow: 0 18px 32px rgba(0,0,0,0.42);
    }

    .note.dragging {
      cursor: grabbing;
      z-index: 80;
      transform: rotate(0deg) scale(1.04);
      box-shadow: 0 25px 45px rgba(0,0,0,0.5);
    }

    .note::before {
      content: "";
      width: 15px;
      height: 15px;
      border-radius: 999px;
      background: #1d1d1b;
      position: absolute;
      top: 7px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow:
        0 2px 5px rgba(0,0,0,0.35),
        inset 0 1px 2px rgba(255,255,255,0.45);
      pointer-events: none;
    }

    .note.paper-b::before {
      background: #2e5d4f;
    }

    .note.paper-c::before {
      background: #b43b2f;
    }

    .note.paper-d::before {
      background: #304f85;
    }

    .note.paper-e::before {
      background: #6f8f42;
    }

    .delete-note-button {
      display: none;
      position: absolute;
      top: -12px;
      right: -12px;
      width: 30px;
      height: 30px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.7);
      background: #1d1d1b;
      color: #fff;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      z-index: 90;
      box-shadow: 0 5px 14px rgba(0,0,0,0.35);
    }

    .admin-mode .delete-note-button {
      display: block;
    }

    .note-title {
      margin: 0 0 8px;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.35;
      pointer-events: none;
      border-bottom: 1px solid rgba(0,0,0,0.16);
      padding-bottom: 6px;
    }

    .note-body {
      margin: 0;
      font-size: 12.5px;
      line-height: 1.6;
      white-space: pre-wrap;
      pointer-events: none;
    }

    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.58);
      z-index: 100;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .modal {
      width: min(560px, 100%);
      background: #f8f1dd;
      padding: 28px;
      box-shadow: 0 22px 70px rgba(0,0,0,0.45);
      position: relative;
      border: 1px solid rgba(0,0,0,0.22);
    }

    .modal h2 {
      margin: 0 0 14px;
      font-size: 24px;
      border-bottom: 1px solid rgba(0,0,0,0.18);
      padding-bottom: 10px;
    }

    .modal p {
      margin: 0;
      font-size: 15px;
      line-height: 1.8;
      white-space: pre-wrap;
    }

    .close {
      position: absolute;
      top: 12px;
      right: 12px;
      border: none;
      background: #1d1d1b;
      color: white;
      border-radius: 999px;
      width: 32px;
      height: 32px;
      cursor: pointer;
    }

    .form-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.48);
      z-index: 110;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .form-box {
      width: min(460px, 100%);
      background: #f8f1dd;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.42);
      border: 1px solid rgba(0,0,0,0.22);
    }

    .form-box h2 {
      margin: 0 0 16px;
      font-size: 22px;
      letter-spacing: 0.03em;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid rgba(0,0,0,0.24);
      background: #fffdf7;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 15px;
      font-family: inherit;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .cancel-button,
    .submit-button {
      border: 1px solid rgba(0,0,0,0.28);
      padding: 10px 16px;
      cursor: pointer;
      font-size: 13px;
      letter-spacing: 0.06em;
      font-weight: 700;
    }

    .cancel-button {
      background: #e6dfd0;
      color: #251f1a;
    }

    .submit-button {
      background: #1d1d1b;
      color: #fff;
    }

    @media (max-width: 700px) {
      .app {
        padding: 14px;
        background-position: center;
      }

      .top {
        justify-content: flex-end;
      }

      .post-button,
      .admin-button {
        font-size: 11px;
        padding: 9px 12px;
      }

      .board {
        min-height: 760px;
      }

      .note,
      .note.paper-a,
      .note.paper-b,
      .note.paper-c,
      .note.paper-d,
      .note.paper-e {
        width: 175px;
        min-height: 150px;
      }

      .note-title {
        font-size: 14px;
      }

      .note-body {
        font-size: 12px;
      }

      .hint {
        font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="top">
      <div class="top-buttons">
        <button class="admin-button" onclick="toggleAdminMode()">ADMIN</button>
        <button class="post-button" onclick="openForm()">POST A NOTE</button>
      </div>
    </div>

    <div id="adminStatus" class="admin-status">
      管理者モード中です。各メモの右上の「×」から削除できます。
    </div>

    <div id="board" class="board">
      <div id="loading" class="loading">読み込み中...</div>
      <div id="empty" class="empty" style="display:none;">まだ投稿がありません。</div>
      <div class="hint">Drag notes / Double click to read</div>
    </div>
  </div>

  <!-- 投稿フォーム -->
  <div id="formBg" class="form-bg">
    <div class="form-box">
      <h2>POST A NOTE</h2>
      <input id="titleInput" type="text" placeholder="Title" maxlength="40" />
      <textarea id="bodyInput" placeholder="Write your note" maxlength="500"></textarea>

      <div class="form-actions">
        <button class="cancel-button" onclick="closeForm()">CANCEL</button>
        <button class="submit-button" onclick="submitNote()">POST</button>
      </div>
    </div>
  </div>

  <!-- 拡大モーダル -->
  <div id="modalBg" class="modal-bg" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <button class="close" onclick="closeModal()">×</button>
      <h2 id="modalTitle"></h2>
      <p id="modalBody"></p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      onSnapshot,
      query,
      orderBy,
      serverTimestamp,
      doc,
      updateDoc,
      deleteDoc
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAEg3KksEhcgHash5UIhjv9Iy2z5bS0G1c",
      authDomain: "jugar-83471.firebaseapp.com",
      databaseURL: "https://jugar-83471-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "jugar-83471",
      storageBucket: "jugar-83471.firebasestorage.app",
      messagingSenderId: "498899531121",
      appId: "1:498899531121:web:7591904e22af9fefcd32d0"
    };

    const ADMIN_PASSWORD = "jugar-admin";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const boardEl = document.getElementById("board");
    const emptyEl = document.getElementById("empty");
    const loadingEl = document.getElementById("loading");
    const adminStatusEl = document.getElementById("adminStatus");

    const rotations = ["-4deg", "3deg", "-2deg", "4deg", "1.5deg", "-3deg", "2deg"];
    const paperClasses = ["paper-a", "paper-b", "paper-c", "paper-d", "paper-e"];

    let isDragging = false;
    let dragMoved = false;
    let currentNoteEl = null;
    let currentNoteId = null;
    let offsetX = 0;
    let offsetY = 0;
    let isAdminMode = false;

    window.toggleAdminMode = function () {
      if (isAdminMode) {
        isAdminMode = false;
        document.body.classList.remove("admin-mode");
        adminStatusEl.style.display = "none";
        alert("管理者モードを終了しました。");
        return;
      }

      const inputPassword = prompt("管理者パスワードを入力してください。");

      if (inputPassword === ADMIN_PASSWORD) {
        isAdminMode = true;
        document.body.classList.add("admin-mode");
        adminStatusEl.style.display = "block";
        alert("管理者モードになりました。");
      } else if (inputPassword !== null) {
        alert("パスワードが違います。");
      }
    };

    window.openForm = function () {
      document.getElementById("formBg").style.display = "flex";
    };

    window.closeForm = function () {
      document.getElementById("formBg").style.display = "none";
      document.getElementById("titleInput").value = "";
      document.getElementById("bodyInput").value = "";
    };

    function getRandomPosition() {
      const boardRect = boardEl.getBoundingClientRect();

      const noteWidth = 220;
      const noteHeight = 190;

      const maxX = Math.max(20, boardRect.width - noteWidth - 40);
      const maxY = Math.max(80, boardRect.height - noteHeight - 40);

      return {
        x: Math.floor(25 + Math.random() * maxX),
        y: Math.floor(45 + Math.random() * maxY)
      };
    }

    window.submitNote = async function () {
      const title = document.getElementById("titleInput").value.trim();
      const body = document.getElementById("bodyInput").value.trim();

      if (!title || !body) {
        alert("タイトルと本文を入力してください。");
        return;
      }

      const position = getRandomPosition();

      try {
        await addDoc(collection(db, "notes"), {
          title: title,
          body: body,
          x: position.x,
          y: position.y,
          createdAt: serverTimestamp()
        });

        closeForm();
      } catch (error) {
        console.error(error);
        alert("投稿に失敗しました。Firebaseの設定を確認してください。");
      }
    };

    async function deleteNote(noteId) {
      if (!isAdminMode) {
        alert("削除するには管理者モードにしてください。");
        return;
      }

      const ok = confirm("この投稿を削除しますか？");

      if (!ok) return;

      try {
        await deleteDoc(doc(db, "notes", noteId));
      } catch (error) {
        console.error(error);
        alert("削除に失敗しました。Firebaseの設定を確認してください。");
      }
    }

    function openModal(title, body) {
      document.getElementById("modalTitle").textContent = title;
      document.getElementById("modalBody").textContent = body;
      document.getElementById("modalBg").style.display = "flex";
    }

    window.closeModal = function () {
      document.getElementById("modalBg").style.display = "none";
    };

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function startDrag(event, noteEl, noteId) {
      if (event.pointerType === "mouse" && event.button !== 0) return;

      isDragging = true;
      dragMoved = false;
      currentNoteEl = noteEl;
      currentNoteId = noteId;

      const noteRect = noteEl.getBoundingClientRect();

      offsetX = event.clientX - noteRect.left;
      offsetY = event.clientY - noteRect.top;

      noteEl.classList.add("dragging");
      noteEl.setPointerCapture(event.pointerId);

      event.preventDefault();
    }

    function moveDrag(event) {
      if (!isDragging || !currentNoteEl) return;

      const boardRect = boardEl.getBoundingClientRect();

      let newX = event.clientX - boardRect.left - offsetX;
      let newY = event.clientY - boardRect.top - offsetY;

      const maxX = boardEl.clientWidth - currentNoteEl.offsetWidth - 16;
      const maxY = boardEl.clientHeight - currentNoteEl.offsetHeight - 16;

      newX = clamp(newX, 10, maxX);
      newY = clamp(newY, 10, maxY);

      currentNoteEl.style.left = newX + "px";
      currentNoteEl.style.top = newY + "px";

      dragMoved = true;
    }

    async function endDrag(event) {
      if (!isDragging || !currentNoteEl || !currentNoteId) return;

      currentNoteEl.classList.remove("dragging");

      const finalX = parseInt(currentNoteEl.style.left, 10);
      const finalY = parseInt(currentNoteEl.style.top, 10);

      const savedNoteId = currentNoteId;

      isDragging = false;
      currentNoteEl = null;
      currentNoteId = null;

      if (dragMoved) {
        try {
          await updateDoc(doc(db, "notes", savedNoteId), {
            x: finalX,
            y: finalY
          });
        } catch (error) {
          console.error(error);
          alert("位置の保存に失敗しました。");
        }
      }

      setTimeout(() => {
        dragMoved = false;
      }, 80);
    }

    window.addEventListener("pointermove", moveDrag);
    window.addEventListener("pointerup", endDrag);
    window.addEventListener("pointercancel", endDrag);

    function fallbackPosition(index) {
      const col = index % 4;
      const row = Math.floor(index / 4);

      return {
        x: 24 + col * 220,
        y: 38 + row * 185
      };
    }

    function renderNotes(notes) {
      const oldNotes = boardEl.querySelectorAll(".note");
      oldNotes.forEach((note) => note.remove());

      loadingEl.style.display = "none";
      emptyEl.style.display = notes.length === 0 ? "block" : "none";

      notes.forEach((note, index) => {
        const div = document.createElement("div");
        div.className = "note " + paperClasses[index % paperClasses.length];
        div.style.setProperty("--rotate", rotations[index % rotations.length]);

        const pos = {
          x: typeof note.x === "number" ? note.x : fallbackPosition(index).x,
          y: typeof note.y === "number" ? note.y : fallbackPosition(index).y
        };

        div.style.left = pos.x + "px";
        div.style.top = pos.y + "px";

        const deleteButton = document.createElement("button");
        deleteButton.className = "delete-note-button";
        deleteButton.textContent = "×";
        deleteButton.title = "削除";

        deleteButton.addEventListener("pointerdown", (event) => {
          event.stopPropagation();
        });

        deleteButton.addEventListener("click", (event) => {
          event.stopPropagation();
          deleteNote(note.id);
        });

        const title = document.createElement("h3");
        title.className = "note-title";
        title.textContent = note.title;

        const body = document.createElement("p");
        body.className = "note-body";
        body.textContent = note.body.length > 120 ? note.body.slice(0, 120) + "..." : note.body;

        div.appendChild(deleteButton);
        div.appendChild(title);
        div.appendChild(body);

        div.addEventListener("pointerdown", (event) => {
          startDrag(event, div, note.id);
        });

        div.addEventListener("dblclick", () => {
          if (!dragMoved) {
            openModal(note.title, note.body);
          }
        });

        div.addEventListener("click", () => {
          if (dragMoved) return;

          if (window.innerWidth <= 768) {
            openModal(note.title, note.body);
          }
        });

        boardEl.appendChild(div);
      });
    }

    const q = query(collection(db, "notes"), orderBy("createdAt", "desc"));

    onSnapshot(q, (snapshot) => {
      const notes = [];
      snapshot.forEach((docSnap) => {
        notes.push({
          id: docSnap.id,
          ...docSnap.data()
        });
      });

      renderNotes(notes);
    }, (error) => {
      console.error(error);
      loadingEl.textContent = "読み込みに失敗しました。Firebaseのルールを確認してください。";
    });
  </script>
</body>
</html>
