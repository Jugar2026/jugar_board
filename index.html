<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>JUGAR Cork Board</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #f4efe6;
      color: #2f241b;
    }

    .app {
      width: 100%;
      min-height: 100vh;
      padding: 24px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .top-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0.03em;
    }

    .post-button,
    .admin-button {
      border: none;
      background: #2f241b;
      color: #fff;
      padding: 12px 20px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 15px;
    }

    .admin-button {
      background: #6f4a2d;
    }

    .post-button:hover,
    .admin-button:hover {
      opacity: 0.85;
    }

    .admin-status {
      display: none;
      margin-bottom: 12px;
      padding: 10px 14px;
      background: #fff7d1;
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      font-size: 14px;
    }

    .board {
      position: relative;
      width: 100%;
      min-height: 760px;
      border-radius: 22px;
      overflow: hidden;
      padding: 28px;
      background:
        radial-gradient(circle at 20px 20px, rgba(90, 50, 20, 0.18) 2px, transparent 3px),
        linear-gradient(135deg, #b8753c, #8c5528);
      background-size: 42px 42px, cover;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.25), 0 18px 40px rgba(0,0,0,0.18);
    }

    .board::before {
      content: "";
      position: absolute;
      inset: 14px;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      pointer-events: none;
    }

    .note {
      width: 210px;
      min-height: 170px;
      padding: 22px 18px 18px;
      background: #fff4b8;
      box-shadow: 0 10px 18px rgba(0,0,0,0.22);
      transform: rotate(var(--rotate));
      cursor: grab;
      position: absolute;
      word-break: break-word;
      transition: box-shadow 0.18s ease, transform 0.18s ease;
      user-select: none;
      touch-action: none;
      z-index: 2;
    }

    .note:hover {
      transform: rotate(var(--rotate)) translateY(-4px) scale(1.03);
      box-shadow: 0 16px 26px rgba(0,0,0,0.28);
    }

    .note.dragging {
      cursor: grabbing;
      z-index: 50;
      transform: rotate(0deg) scale(1.04);
      box-shadow: 0 22px 36px rgba(0,0,0,0.35);
    }

    .note::before {
      content: "";
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: #b8322a;
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 2px 5px rgba(0,0,0,0.25);
      pointer-events: none;
    }

    .delete-note-button {
      display: none;
      position: absolute;
      top: -10px;
      right: -10px;
      width: 30px;
      height: 30px;
      border-radius: 999px;
      border: none;
      background: #2f241b;
      color: #fff;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      z-index: 80;
      box-shadow: 0 5px 12px rgba(0,0,0,0.28);
    }

    .admin-mode .delete-note-button {
      display: block;
    }

    .note-title {
      margin: 10px 0 10px;
      font-size: 18px;
      font-weight: 700;
      pointer-events: none;
    }

    .note-body {
      margin: 0;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      pointer-events: none;
    }

    .empty {
      color: rgba(255,255,255,0.9);
      font-size: 16px;
      position: relative;
      z-index: 1;
    }

    .loading {
      color: rgba(255,255,255,0.9);
      position: relative;
      z-index: 1;
    }

    .hint {
      margin: 12px 0 0;
      color: rgba(255,255,255,0.92);
      font-size: 13px;
      position: relative;
      z-index: 1;
    }

    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 100;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .modal {
      width: min(560px, 100%);
      background: #fff8d7;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      position: relative;
    }

    .modal h2 {
      margin: 0 0 14px;
      font-size: 24px;
    }

    .modal p {
      margin: 0;
      font-size: 16px;
      line-height: 1.75;
      white-space: pre-wrap;
    }

    .close {
      position: absolute;
      top: 14px;
      right: 14px;
      border: none;
      background: #2f241b;
      color: white;
      border-radius: 999px;
      width: 32px;
      height: 32px;
      cursor: pointer;
    }

    .form-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 110;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .form-box {
      width: min(460px, 100%);
      background: #fff;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.3);
    }

    .form-box h2 {
      margin: 0 0 16px;
      font-size: 22px;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 15px;
      font-family: inherit;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .cancel-button,
    .submit-button {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
    }

    .cancel-button {
      background: #eee;
      color: #333;
    }

    .submit-button {
      background: #2f241b;
      color: #fff;
    }

    @media (max-width: 600px) {
      .app {
        padding: 16px;
      }

      .top {
        align-items: flex-start;
        flex-direction: column;
      }

      .board {
        min-height: 760px;
        padding: 20px;
      }

      .note {
        width: 190px;
        min-height: 150px;
      }

      .hint {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="top">
      <h1>JUGAR Board</h1>

      <div class="top-buttons">
        <button class="admin-button" onclick="toggleAdminMode()">管理者</button>
        <button class="post-button" onclick="openForm()">投稿する</button>
      </div>
    </div>

    <div id="adminStatus" class="admin-status">
      管理者モード中です。各メモの右上の「×」から削除できます。
    </div>

    <div id="board" class="board">
      <div id="loading" class="loading">読み込み中...</div>
      <div id="empty" class="empty" style="display:none;">まだ投稿がありません。</div>
      <div class="hint">PCではメモをドラッグして動かせます。ダブルクリックで拡大表示できます。</div>
    </div>
  </div>

  <!-- 投稿フォーム -->
  <div id="formBg" class="form-bg">
    <div class="form-box">
      <h2>メモを投稿する</h2>
      <input id="titleInput" type="text" placeholder="タイトル" maxlength="40" />
      <textarea id="bodyInput" placeholder="本文" maxlength="500"></textarea>

      <div class="form-actions">
        <button class="cancel-button" onclick="closeForm()">キャンセル</button>
        <button class="submit-button" onclick="submitNote()">投稿する</button>
      </div>
    </div>
  </div>

  <!-- 拡大モーダル -->
  <div id="modalBg" class="modal-bg" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <button class="close" onclick="closeModal()">×</button>
      <h2 id="modalTitle"></h2>
      <p id="modalBody"></p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      onSnapshot,
      query,
      orderBy,
      serverTimestamp,
      doc,
      updateDoc,
      deleteDoc
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAEg3KksEhcgHash5UIhjv9Iy2z5bS0G1c",
      authDomain: "jugar-83471.firebaseapp.com",
      databaseURL: "https://jugar-83471-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "jugar-83471",
      storageBucket: "jugar-83471.firebasestorage.app",
      messagingSenderId: "498899531121",
      appId: "1:498899531121:web:7591904e22af9fefcd32d0"
    };

    const ADMIN_PASSWORD = "jugar-admin";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const boardEl = document.getElementById("board");
    const emptyEl = document.getElementById("empty");
    const loadingEl = document.getElementById("loading");
    const adminStatusEl = document.getElementById("adminStatus");

    const rotations = ["-3deg", "2deg", "-1.5deg", "3deg", "1deg", "-2.5deg"];

    let isDragging = false;
    let dragMoved = false;
    let currentNoteEl = null;
    let currentNoteId = null;
    let offsetX = 0;
    let offsetY = 0;
    let isAdminMode = false;

    window.toggleAdminMode = function () {
      if (isAdminMode) {
        isAdminMode = false;
        document.body.classList.remove("admin-mode");
        adminStatusEl.style.display = "none";
        alert("管理者モードを終了しました。");
        return;
      }

      const inputPassword = prompt("管理者パスワードを入力してください。");

      if (inputPassword === ADMIN_PASSWORD) {
        isAdminMode = true;
        document.body.classList.add("admin-mode");
        adminStatusEl.style.display = "block";
        alert("管理者モードになりました。");
      } else if (inputPassword !== null) {
        alert("パスワードが違います。");
      }
    };

    window.openForm = function () {
      document.getElementById("formBg").style.display = "flex";
    };

    window.closeForm = function () {
      document.getElementById("formBg").style.display = "none";
      document.getElementById("titleInput").value = "";
      document.getElementById("bodyInput").value = "";
    };

    function getRandomPosition() {
      const boardRect = boardEl.getBoundingClientRect();

      const noteWidth = 210;
      const noteHeight = 170;

      const maxX = Math.max(20, boardRect.width - noteWidth - 40);
      const maxY = Math.max(80, boardRect.height - noteHeight - 40);

      return {
        x: Math.floor(30 + Math.random() * maxX),
        y: Math.floor(80 + Math.random() * maxY)
      };
    }

    window.submitNote = async function () {
      const title = document.getElementById("titleInput").value.trim();
      const body = document.getElementById("bodyInput").value.trim();

      if (!title || !body) {
        alert("タイトルと本文を入力してください。");
        return;
      }

      const position = getRandomPosition();

      try {
        await addDoc(collection(db, "notes"), {
          title: title,
          body: body,
          x: position.x,
          y: position.y,
          createdAt: serverTimestamp()
        });

        closeForm();
      } catch (error) {
        console.error(error);
        alert("投稿に失敗しました。Firebaseの設定を確認してください。");
      }
    };

    async function deleteNote(noteId) {
      if (!isAdminMode) {
        alert("削除するには管理者モードにしてください。");
        return;
      }

      const ok = confirm("この投稿を削除しますか？");

      if (!ok) return;

      try {
        await deleteDoc(doc(db, "notes", noteId));
      } catch (error) {
        console.error(error);
        alert("削除に失敗しました。Firebaseの設定を確認してください。");
      }
    }

    function openModal(title, body) {
      document.getElementById("modalTitle").textContent = title;
      document.getElementById("modalBody").textContent = body;
      document.getElementById("modalBg").style.display = "flex";
    }

    window.closeModal = function () {
      document.getElementById("modalBg").style.display = "none";
    };

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function startDrag(event, noteEl, noteId) {
      if (event.pointerType === "mouse" && event.button !== 0) return;

      isDragging = true;
      dragMoved = false;
      currentNoteEl = noteEl;
      currentNoteId = noteId;

      const noteRect = noteEl.getBoundingClientRect();

      offsetX = event.clientX - noteRect.left;
      offsetY = event.clientY - noteRect.top;

      noteEl.classList.add("dragging");
      noteEl.setPointerCapture(event.pointerId);

      event.preventDefault();
    }

    function moveDrag(event) {
      if (!isDragging || !currentNoteEl) return;

      const boardRect = boardEl.getBoundingClientRect();

      let newX = event.clientX - boardRect.left - offsetX;
      let newY = event.clientY - boardRect.top - offsetY;

      const maxX = boardEl.clientWidth - currentNoteEl.offsetWidth - 20;
      const maxY = boardEl.clientHeight - currentNoteEl.offsetHeight - 20;

      newX = clamp(newX, 20, maxX);
      newY = clamp(newY, 60, maxY);

      currentNoteEl.style.left = newX + "px";
      currentNoteEl.style.top = newY + "px";

      dragMoved = true;
    }

    async function endDrag(event) {
      if (!isDragging || !currentNoteEl || !currentNoteId) return;

      currentNoteEl.classList.remove("dragging");

      const finalX = parseInt(currentNoteEl.style.left, 10);
      const finalY = parseInt(currentNoteEl.style.top, 10);

      const savedNoteId = currentNoteId;

      isDragging = false;
      currentNoteEl = null;
      currentNoteId = null;

      if (dragMoved) {
        try {
          await updateDoc(doc(db, "notes", savedNoteId), {
            x: finalX,
            y: finalY
          });
        } catch (error) {
          console.error(error);
          alert("位置の保存に失敗しました。");
        }
      }

      setTimeout(() => {
        dragMoved = false;
      }, 80);
    }

    window.addEventListener("pointermove", moveDrag);
    window.addEventListener("pointerup", endDrag);
    window.addEventListener("pointercancel", endDrag);

    function fallbackPosition(index) {
      const col = index % 4;
      const row = Math.floor(index / 4);

      return {
        x: 35 + col * 235,
        y: 80 + row * 210
      };
    }

    function renderNotes(notes) {
      const oldNotes = boardEl.querySelectorAll(".note");
      oldNotes.forEach((note) => note.remove());

      loadingEl.style.display = "none";
      emptyEl.style.display = notes.length === 0 ? "block" : "none";

      notes.forEach((note, index) => {
        const div = document.createElement("div");
        div.className = "note";
        div.style.setProperty("--rotate", rotations[index % rotations.length]);

        const pos = {
          x: typeof note.x === "number" ? note.x : fallbackPosition(index).x,
          y: typeof note.y === "number" ? note.y : fallbackPosition(index).y
        };

        div.style.left = pos.x + "px";
        div.style.top = pos.y + "px";

        const deleteButton = document.createElement("button");
        deleteButton.className = "delete-note-button";
        deleteButton.textContent = "×";
        deleteButton.title = "削除";

        deleteButton.addEventListener("pointerdown", (event) => {
          event.stopPropagation();
        });

        deleteButton.addEventListener("click", (event) => {
          event.stopPropagation();
          deleteNote(note.id);
        });

        const title = document.createElement("h3");
        title.className = "note-title";
        title.textContent = note.title;

        const body = document.createElement("p");
        body.className = "note-body";
        body.textContent = note.body.length > 90 ? note.body.slice(0, 90) + "..." : note.body;

        div.appendChild(deleteButton);
        div.appendChild(title);
        div.appendChild(body);

        div.addEventListener("pointerdown", (event) => {
          startDrag(event, div, note.id);
        });

        div.addEventListener("dblclick", () => {
          if (!dragMoved) {
            openModal(note.title, note.body);
          }
        });

        div.addEventListener("click", () => {
          if (dragMoved) return;

          if (window.innerWidth <= 768) {
            openModal(note.title, note.body);
          }
        });

        boardEl.appendChild(div);
      });
    }

    const q = query(collection(db, "notes"), orderBy("createdAt", "desc"));

    onSnapshot(q, (snapshot) => {
      const notes = [];
      snapshot.forEach((docSnap) => {
        notes.push({
          id: docSnap.id,
          ...docSnap.data()
        });
      });

      renderNotes(notes);
    }, (error) => {
      console.error(error);
      loadingEl.textContent = "読み込みに失敗しました。Firebaseのルールを確認してください。";
    });
  </script>
</body>
</html>
