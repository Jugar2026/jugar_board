<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>JUGAR Cork Board</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #f4efe6;
      color: #2f241b;
    }

    .app {
      width: 100%;
      min-height: 100vh;
      padding: 24px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0.03em;
    }

    .post-button {
      border: none;
      background: #2f241b;
      color: #fff;
      padding: 12px 20px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 15px;
    }

    .post-button:hover {
      opacity: 0.85;
    }

    .board {
      position: relative;
      width: 100%;
      min-height: 700px;
      border-radius: 22px;
      overflow: hidden;
      padding: 28px;
      background:
        radial-gradient(circle at 20px 20px, rgba(90, 50, 20, 0.18) 2px, transparent 3px),
        linear-gradient(135deg, #b8753c, #8c5528);
      background-size: 42px 42px, cover;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.25), 0 18px 40px rgba(0,0,0,0.18);
    }

    .board::before {
      content: "";
      position: absolute;
      inset: 14px;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      pointer-events: none;
    }

    .notes {
      position: relative;
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      z-index: 1;
    }

    .note {
      width: 210px;
      min-height: 170px;
      padding: 22px 18px 18px;
      background: #fff4b8;
      box-shadow: 0 10px 18px rgba(0,0,0,0.22);
      transform: rotate(var(--rotate));
      cursor: pointer;
      position: relative;
      word-break: break-word;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .note:hover {
      transform: rotate(var(--rotate)) translateY(-4px) scale(1.03);
      box-shadow: 0 16px 26px rgba(0,0,0,0.28);
    }

    .note::before {
      content: "";
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: #b8322a;
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 2px 5px rgba(0,0,0,0.25);
    }

    .note-title {
      margin: 10px 0 10px;
      font-size: 18px;
      font-weight: 700;
    }

    .note-body {
      margin: 0;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .empty {
      color: rgba(255,255,255,0.9);
      font-size: 16px;
      position: relative;
      z-index: 1;
    }

    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 10;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .modal {
      width: min(560px, 100%);
      background: #fff8d7;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      position: relative;
    }

    .modal h2 {
      margin: 0 0 14px;
      font-size: 24px;
    }

    .modal p {
      margin: 0;
      font-size: 16px;
      line-height: 1.75;
      white-space: pre-wrap;
    }

    .close {
      position: absolute;
      top: 14px;
      right: 14px;
      border: none;
      background: #2f241b;
      color: white;
      border-radius: 999px;
      width: 32px;
      height: 32px;
      cursor: pointer;
    }

    .form-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 20;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .form-box {
      width: min(460px, 100%);
      background: #fff;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.3);
    }

    .form-box h2 {
      margin: 0 0 16px;
      font-size: 22px;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 15px;
      font-family: inherit;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .cancel-button,
    .submit-button {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
    }

    .cancel-button {
      background: #eee;
      color: #333;
    }

    .submit-button {
      background: #2f241b;
      color: #fff;
    }

    .loading {
      color: rgba(255,255,255,0.9);
      position: relative;
      z-index: 1;
    }

    @media (max-width: 600px) {
      .app {
        padding: 16px;
      }

      .top {
        align-items: flex-start;
        flex-direction: column;
      }

      .board {
        min-height: 600px;
        padding: 22px;
      }

      .note {
        width: 100%;
        transform: rotate(0deg);
      }

      .note:hover {
        transform: translateY(-3px) scale(1.01);
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="top">
      <h1>JUGAR Board</h1>
      <button class="post-button" onclick="openForm()">投稿する</button>
    </div>

    <div class="board">
      <div id="loading" class="loading">読み込み中...</div>
      <div id="empty" class="empty" style="display:none;">まだ投稿がありません。</div>
      <div id="notes" class="notes"></div>
    </div>
  </div>

  <!-- 投稿フォーム -->
  <div id="formBg" class="form-bg">
    <div class="form-box">
      <h2>メモを投稿する</h2>
      <input id="titleInput" type="text" placeholder="タイトル" maxlength="40" />
      <textarea id="bodyInput" placeholder="本文" maxlength="500"></textarea>

      <div class="form-actions">
        <button class="cancel-button" onclick="closeForm()">キャンセル</button>
        <button class="submit-button" onclick="submitNote()">投稿する</button>
      </div>
    </div>
  </div>

  <!-- 拡大モーダル -->
  <div id="modalBg" class="modal-bg" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <button class="close" onclick="closeModal()">×</button>
      <h2 id="modalTitle"></h2>
      <p id="modalBody"></p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      onSnapshot,
      query,
      orderBy,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAEg3KksEhcgHash5UIhjv9Iy2z5bS0G1c",
      authDomain: "jugar-83471.firebaseapp.com",
      databaseURL: "https://jugar-83471-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "jugar-83471",
      storageBucket: "jugar-83471.firebasestorage.app",
      messagingSenderId: "498899531121",
      appId: "1:498899531121:web:7591904e22af9fefcd32d0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const notesEl = document.getElementById("notes");
    const emptyEl = document.getElementById("empty");
    const loadingEl = document.getElementById("loading");

    const rotations = ["-3deg", "2deg", "-1.5deg", "3deg", "1deg", "-2.5deg"];

    window.openForm = function () {
      document.getElementById("formBg").style.display = "flex";
    };

    window.closeForm = function () {
      document.getElementById("formBg").style.display = "none";
      document.getElementById("titleInput").value = "";
      document.getElementById("bodyInput").value = "";
    };

    window.submitNote = async function () {
      const title = document.getElementById("titleInput").value.trim();
      const body = document.getElementById("bodyInput").value.trim();

      if (!title || !body) {
        alert("タイトルと本文を入力してください。");
        return;
      }

      try {
        await addDoc(collection(db, "notes"), {
          title: title,
          body: body,
          createdAt: serverTimestamp()
        });

        closeForm();
      } catch (error) {
        console.error(error);
        alert("投稿に失敗しました。Firebaseの設定を確認してください。");
      }
    };

    function openModal(title, body) {
      document.getElementById("modalTitle").textContent = title;
      document.getElementById("modalBody").textContent = body;
      document.getElementById("modalBg").style.display = "flex";
    }

    window.closeModal = function () {
      document.getElementById("modalBg").style.display = "none";
    };

    function renderNotes(notes) {
      notesEl.innerHTML = "";

      loadingEl.style.display = "none";
      emptyEl.style.display = notes.length === 0 ? "block" : "none";

      notes.forEach((note, index) => {
        const div = document.createElement("div");
        div.className = "note";
        div.style.setProperty("--rotate", rotations[index % rotations.length]);

        const title = document.createElement("h3");
        title.className = "note-title";
        title.textContent = note.title;

        const body = document.createElement("p");
        body.className = "note-body";
        body.textContent = note.body.length > 90 ? note.body.slice(0, 90) + "..." : note.body;

        div.appendChild(title);
        div.appendChild(body);

        div.addEventListener("dblclick", () => {
          openModal(note.title, note.body);
        });

        div.addEventListener("click", () => {
          if (window.innerWidth <= 768) {
            openModal(note.title, note.body);
          }
        });

        notesEl.appendChild(div);
      });
    }

    const q = query(collection(db, "notes"), orderBy("createdAt", "desc"));

    onSnapshot(q, (snapshot) => {
      const notes = [];
      snapshot.forEach((doc) => {
        notes.push({
          id: doc.id,
          ...doc.data()
        });
      });

      renderNotes(notes);
    }, (error) => {
      console.error(error);
      loadingEl.textContent = "読み込みに失敗しました。Firebaseのルールを確認してください。";
    });
  </script>
</body>
</html>
